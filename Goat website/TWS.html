    <style>
        .k2 .container-item img {
            object-fit: cover;

            width: 100%;
            height: 70%;
            border: 1px solid lightgray;
            border-radius: 0px !important;
            transition: transform 0.6s ease-out, box-shadow 0.3s ease;
        }

        .video {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 90vh;
            overflow: hidden;
            align-content: flex-start;
        }

        .video video {
            z-index: -100;
            width: 100%;
            height: 100%;
            display: flex;
            object-fit: cover;
        }

        @media (max-width: 1200px) {
            .video {

                width: 100%;
                height: 100%;
                object-fit: fill;
                object-position: top;
            }
        }

       
    </style>
</head>
