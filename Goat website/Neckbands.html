<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neckband</title>
    <link rel="icon" href="/iceico/Goat assests/Goat_LOGO2.png" type="image/x-icon">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="cards.css">
    <link rel="stylesheet" href="cards1.css">
    <style>
        .k2 .container-item img {
            object-fit: cover;

            width: 100%;
            height: 70%;
            border: 1px solid lightgray;
            border-radius: 0px !important;
            transition: transform 0.6s ease-out, box-shadow 0.3s ease;
        }

        .video {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 90vh;
            overflow: hidden;
            align-content: flex-start;
        }

        .video video {
            z-index: -100;
            width: 100%;
            height: 100%;
            display: flex;
            object-fit: cover;
        }

        @media (max-width: 1200px) {
            .video {

                width: 100%;
                height: 100%;
                object-fit: fill;
                object-position: top;
            }
        }

        .imgFront {
            width: 100%;
            display: flex;
            flex-direction: column;
            height: 100VH;
            align-content: flex-start;

        }

        .imgFront img {
            display: flex;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media(max-width: 1200px) {
            .imgFront {
                width: 100%;
                height: 300px;
                margin-top: 3px;
            }

            .imgFront img {
                width: 100%;
                height: 100%;
                object-fit: fill;
            }
        }
    </style>
</head>

<body>
    <div id="navbar"></div>
    <div class="video img">

                        height="300"></a>
